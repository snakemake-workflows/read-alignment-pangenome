$schema: "https://json-schema.org/draft/2020-12/schema"

description: an entry in the sample sheet for the read-alignment-pangenome workflow

type: object
properties:
  sample_name:
    type: string
    description: sample name/identifier (alphanumeric, may include '_' and '-')
    pattern: "^[a-zA-Z_0-9-]+$"

  group:
    type: string
    description: group of samples (optional; if missing, sample_name is used as group)
    pattern: "^[a-zA-Z_0-9-]+$"

  primer_panel:
    type: string
    description: ID of primer panel (used if primers are configured)

  platform:
    type: string
    enum:
      [
        "CAPILLARY",
        "LS454",
        "ILLUMINA",
        "SOLID",
        "HELICOS",
        "IONTORRENT",
        "ONT",
        "PACBIO",
      ]
    description: sequencing platform (optional; used for read group metadata if enabled)

  datatype:
    type: string
    enum: [dna, rna]
    description: datatype (optional; kept for compatibility)

required:
  - sample_name
