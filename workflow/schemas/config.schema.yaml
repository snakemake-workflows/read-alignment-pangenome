$schema: "http://json-schema.org/draft-07/schema#"

description: MINI workflow configuration file (trim + vg mapping + primers + QC)

type: object

properties:
  samples:
    type: string

  units:
    type: string

  ref:
    type: object
    properties:
      species:
        type: string
      release:
        type: integer
      build:
        type: string
      pangenome:
        type: object
        properties:
          activate:
            type: boolean
          source:
            type: string
          version:
            type: string
        required:
          - activate
          - source
          - version
    required:
      - species
      - release
      - build
      - pangenome

  primers:
    type: object
    properties:
      trimming:
        type: object
        properties:
          primers_fa1:
            type: string
          primers_fa2:
            type: string
          tsv:
            type: string
          library_length:
            type: integer
        required:
          - tsv
    required:
      - trimming

  params:
    type: object
    properties:
      fastp:
        type: string

required:
  - samples
  - units
  - ref
  - primers
